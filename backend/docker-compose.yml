services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: mqma
      POSTGRES_USER: mqma
      POSTGRES_PASSWORD: mqma
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: gunicorn mqma.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - .:/app
      - media:/app/media
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A mqma worker -l info -Q default,matching,notifications
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A mqma beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  media:
